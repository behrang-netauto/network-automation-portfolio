---
- name: Prepare NETCONF/YANG read evidence directory
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    generated_run_id: "{{ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}"
    project_root: "{{ playbook_dir | dirname }}"

  tasks:
    - name: "NETCONF | Set run metadata"
      ansible.builtin.set_fact:
        run_id: "{{ run_id | default(generated_run_id, true) }}"
        evidence_root_effective: "{{ evidence_root | default('evidence_pack') }}"

    - name: "NETCONF | Set output directories"
      ansible.builtin.set_fact:
        command_output_dir: "{{ project_root }}/{{ evidence_root_effective }}/command_outputs/{{ run_id }}"
        report_output_dir: "{{ project_root }}/{{ evidence_root_effective }}/rendered_configs/{{ run_id }}"

    - name: "NETCONF | Show run id"
      ansible.builtin.debug:
        msg: "run_id={{ hostvars['localhost']['run_id'] }}"

    - name: "NETCONF | Create output directories"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ hostvars['localhost']['command_output_dir'] }}"
        - "{{ hostvars['localhost']['report_output_dir'] }}"


- name: Read IOS XE YANG-modeled data over NETCONF
  hosts: iosxe_netconf
  gather_facts: false
  ignore_unreachable: true

  tasks:
    - name: Run data-driven NETCONF get checks
      ansible.netcommon.netconf_get:
        filter: "{{ item.filter }}"
        display: pretty
        lock: never
      loop: "{{ netconf_checks }}"
      loop_control:
        label: "{{ item.name }}"
      register: netconf_get_results
      changed_when: false
      ignore_errors: true

    - name: Ensure per-host evidence directory exists
      ansible.builtin.file:
        path: "{{ hostvars['localhost']['command_output_dir'] }}/{{ inventory_hostname }}"
        state: directory
        mode: "0755"
      delegate_to: localhost

    - name: Ensure per-check evidence subdirectory exists (if needed)
      ansible.builtin.file:
        path: "{{ hostvars['localhost']['command_output_dir'] }}/{{ inventory_hostname }}/{{ item.item.output_file | dirname }}"
        state: directory
        mode: "0755"
      loop: "{{ netconf_get_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.name }}"
      delegate_to: localhost
      when:
        - not (item.failed | default(false))
        - item.output is defined
        - item.output | trim | length > 0
        - (item.item.output_file | dirname | length) > 0

    - name: Save successful NETCONF XML evidence files
      ansible.builtin.copy:
        dest: "{{ hostvars['localhost']['command_output_dir'] }}/{{ inventory_hostname }}/{{ item.item.output_file }}"
        mode: "0644"
        content: "{{ item.output }}"
      loop: "{{ netconf_get_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.name }}"
      delegate_to: localhost
      changed_when: false
      when:
        - not (item.failed | default(false))
        - item.output is defined
        - item.output | trim | length > 0


- name: Render NETCONF/YANG read evidence report
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Render NETCONF/YANG read report
      ansible.builtin.template:
        src: "{{ playbook_dir | dirname }}/templates/netconf_yang_read_report.md.j2"
        dest: "{{ hostvars['localhost']['report_output_dir'] }}/netconf_yang_read_report.md"
        mode: "0644"
      changed_when: false
